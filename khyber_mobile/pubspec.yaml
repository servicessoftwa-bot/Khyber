name: khyber
description: Khyber - KPK City Services App
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.1.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management & navigation
  get: ^4.6.6

  # Networking
  dio: ^5.4.0

  # Local storage
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  get_storage: ^2.1.1

  # UI
  google_fonts: ^6.2.1
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  flutter_svg: ^2.0.10+1
  lottie: ^3.1.0
  badges: ^3.1.2

  # Maps
  flutter_map: ^6.1.0
  latlong2: ^0.9.1

  # Media
  image_picker: ^1.0.7

  # Utils
  url_launcher: ^6.2.5
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  connectivity_plus: ^6.0.3
  permission_handler: ^11.3.1
  geolocator: ^11.0.0
  path_provider: ^2.1.3
  flutter_local_notifications: ^17.1.2
  package_info_plus: ^8.0.0
  share_plus: ^9.0.0
  webview_flutter: ^4.7.0
  qr_flutter: ^4.1.0
  smooth_page_indicator: ^1.1.0
  carousel_slider: ^4.2.1
  flutter_rating_bar: ^4.0.1
  table_calendar: ^3.1.1
  percent_indicator: ^4.2.3
  animations: ^2.0.11
  skeletonizer: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/lottie/

flutter_icons:
  android: true
  ios: true
  image_path: "assets/icons/icon_512.png"
  adaptive_icon_background: "#C0392B"
  adaptive_icon_foreground: "assets/icons/icon_512.png"
  remove_alpha_ios: true
